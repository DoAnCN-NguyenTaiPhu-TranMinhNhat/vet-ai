name: Continuous Training

on:
  workflow_dispatch:
    inputs:
      trigger_reason:
        description: "Reason for manual trigger"
        required: false
        type: string
  schedule:
    - cron: "0 2 * * *"

jobs:
  training-readiness:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            ai_service/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r ai_service/requirements.txt

      - name: Validate continuous training imports
        env:
          PYTHONPATH: ${{ github.workspace }}
          VETAI_CHAMPION_REGISTRY_PATH: /tmp/vetai-champion-registry
        run: |
          python -c "from ai_service.app.domain.services.training_service import get_training_router; print('ct router:', bool(get_training_router()))"

      - name: Run smoke tests
        env:
          MODEL_DIR: ./ai_service/models/v2
          PYTHONPATH: ${{ github.workspace }}
          VETAI_CHAMPION_REGISTRY_PATH: /tmp/vetai-champion-registry
        run: |
          python -m pytest -q ai_service/tests/test_smoke.py

      - name: Manual trigger note
        if: github.event_name == 'workflow_dispatch'
        run: |
          echo "Manual trigger reason: ${{ github.event.inputs.trigger_reason }}"
          echo "Readiness checks passed. Trigger actual training from API or EKS pipeline."
